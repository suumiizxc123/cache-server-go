version: "3.9"

# ═══════════════════════════════════════════════════════
#  Docker Compose — PRODUCTION (Full Stack)
#
#  Usage:
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
#  Adds to dev:
#    - HAProxy (load balancer)
#    - Redis Replica + Sentinel (HA)
#    - Prometheus + Alertmanager (metrics + alerts)
#    - Grafana (dashboard)
#    - Loki + Promtail (log aggregation)
#    - Node Exporter + Blackbox (infrastructure monitoring)
#
#  Flow:
#    Client → HAProxy(:80) → Varnish (RAM) → Nginx → Go/MinIO  [assets]
#    Client → HAProxy(:80) → Varnish → Nginx → Go server       [API pass-through]
# ═══════════════════════════════════════════════════════

services:
  # ══════════════════════════════════════════
  #  Overrides: production settings
  # ══════════════════════════════════════════

  nginx:
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  cache-server:
    deploy:
      replicas: 4
    restart: unless-stopped

  redis:
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lfu
      --save ""
      --appendonly no
      --tcp-backlog 511
      --hz 100
      --tcp-keepalive 60
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  minio:
    restart: unless-stopped

  # ══════════════════════════════════════════
  #  Varnish (RAM Cache — L0)
  # ══════════════════════════════════════════

  varnish:
    image: varnish:7.4-alpine
    container_name: cache-varnish
    ports:
      - "6081:6081"
    volumes:
      - ./varnish/default.vcl:/etc/varnish/default.vcl:ro
    command: >
      varnishd
      -F
      -a :6081
      -f /etc/varnish/default.vcl
      -s malloc,1G
      -p thread_pools=2
      -p thread_pool_min=50
      -p thread_pool_max=1000
      -p workspace_client=256k
      -p workspace_backend=256k
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          memory: 1536M
    restart: unless-stopped

  # ══════════════════════════════════════════
  #  Load Balancer
  # ══════════════════════════════════════════

  haproxy:
    image: haproxy:2.8-alpine
    container_name: cache-haproxy
    ports:
      - "80:80"
      - "443:443"
      - "8404:8404"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - varnish
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  # ══════════════════════════════════════════
  #  Redis HA (Replica + Sentinel)
  # ══════════════════════════════════════════

  redis-replica:
    image: redis:7-alpine
    container_name: cache-redis-replica
    command: >
      redis-server
      --replicaof redis 6379
      --maxmemory 1gb
      --maxmemory-policy allkeys-lfu
      --save ""
      --appendonly no
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  redis-sentinel:
    image: redis:7-alpine
    container_name: cache-redis-sentinel
    ports:
      - "26379:26379"
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    command: redis-sentinel /etc/redis/sentinel.conf
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ══════════════════════════════════════════
  #  Monitoring
  # ══════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: cache-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: cache-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/config.yml:/etc/alertmanager/config.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: cache-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

  # ══════════════════════════════════════════
  #  Logging
  # ══════════════════════════════════════════

  loki:
    image: grafana/loki:2.9.0
    container_name: cache-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: cache-promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
    restart: unless-stopped

  # ══════════════════════════════════════════
  #  Exporters
  # ══════════════════════════════════════════

  node-exporter:
    image: prom/node-exporter:latest
    container_name: cache-node-exporter
    ports:
      - "9100:9100"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    restart: unless-stopped

  blackbox:
    image: prom/blackbox-exporter:latest
    container_name: cache-blackbox
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox/config.yml:/etc/blackbox/config.yml:ro
    command: --config.file=/etc/blackbox/config.yml
    restart: unless-stopped

volumes:
  redis-data:
  grafana-data:
  loki-data:
