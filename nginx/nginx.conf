# ═══════════════════════════════════════════════════════
#  Nginx — Reverse Proxy + Routing Layer (Hybrid)
#
#  Architecture:
#    Client → Nginx(:80) → Squid(:3128) → MinIO (binary assets)
#    Client → Nginx(:80) → Go Server(:8080) (API/cache)
#
#  Nginx handles: routing, SSL, gzip, rate limiting, CORS
#  Squid handles: disk-based binary content caching
# ═══════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ── Buffers ──
    client_max_body_size 100m;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css text/xml application/json
               application/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 4;

    # ── Logging ──
    log_format cache '$remote_addr - $request_method $uri '
                     'status=$status bytes=$bytes_sent '
                     'cache=$upstream_cache_status '
                     'time=${request_time}s';
    access_log /var/log/nginx/access.log cache;

    # ── Upstream: Go Cache Server ──
    upstream cache_server {
        server cache-server:8080;
        keepalive 128;
    }

    # ── Upstream: Squid (disk-based binary cache) ──
    upstream squid {
        server squid:3128;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        # ═══════════════════════════════════════
        #  /api/* → Go Cache Server (no nginx cache)
        # ═══════════════════════════════════════
        location /cache/ {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        location /stats {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /meta/ {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /list-assets {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ═══════════════════════════════════════
        #  /assets/* → Squid (disk cache) → MinIO
        #  Squid caches binary content on disk
        #  Nginx handles routing, gzip, CORS
        # ═══════════════════════════════════════
        location /assets/ {
            # Pass to Squid, which fetches from MinIO on cache miss
            proxy_pass http://squid;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host minio:9000;

            # Headers for client
            add_header X-Squid-Cache $upstream_http_x_cache_status always;
            add_header Cache-Control "public, max-age=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ═══════════════════════════════════════
        #  /upload/* → Go server handles uploads
        # ═══════════════════════════════════════
        location /upload/ {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Content-Type $content_type;
            client_max_body_size 100m;
        }

        # ── Nginx status (for monitoring) ──
        location /nginx-status {
            stub_status on;
            allow 127.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
        }
    }
}
