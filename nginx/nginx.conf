# ═══════════════════════════════════════════════════════
#  Nginx — Reverse Proxy + Disk Cache
#
#  Architecture:
#    Client → Nginx(:80) → MinIO (binary assets, disk cached)
#    Client → Nginx(:80) → Go Server(:8080) (API/cache)
#
#  Nginx handles: routing, disk cache, gzip, CORS
# ═══════════════════════════════════════════════════════

worker_processes 4;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ── Buffers ──
    client_max_body_size 100m;
    proxy_buffer_size 32k;
    proxy_buffers 4 64k;
    proxy_busy_buffers_size 128k;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css text/xml application/json
               application/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 4;

    # ── Disk Cache (replaces Squid) ──
    proxy_cache_path /var/cache/nginx/assets
                     levels=1:2
                     keys_zone=assets_cache:10m
                     max_size=2g
                     inactive=7d
                     use_temp_path=off;

    # ── Logging ──
    log_format cache '$remote_addr - $request_method $uri '
                     'status=$status bytes=$bytes_sent '
                     'cache=$upstream_cache_status '
                     'time=${request_time}s';
    access_log /var/log/nginx/access.log cache;

    # ── Upstream: Go Cache Server ──
    upstream cache_server {
        server cache-server:8080;
        keepalive 128;
    }

    # ── Upstream: MinIO (origin storage) ──
    upstream minio_origin {
        server minio:9000;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        # ═══════════════════════════════════════
        #  /api/* → Go Cache Server (no cache)
        # ═══════════════════════════════════════
        location /cache/ {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        location /stats {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /meta/ {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /list-assets {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ═══════════════════════════════════════
        #  /assets/* → Nginx disk cache → MinIO
        #  2GB disk cache, 7 day inactive TTL
        # ═══════════════════════════════════════
        location /assets/ {
            proxy_pass http://minio_origin;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host minio:9000;

            # Disk cache config
            proxy_cache assets_cache;
            proxy_cache_key $uri;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            proxy_cache_min_uses 1;

            # Ignore upstream cache-busting headers (MinIO sends these)
            proxy_ignore_headers Cache-Control Expires Set-Cookie X-Accel-Expires Vary;

            # Cache status header
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=86400" always;
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ═══════════════════════════════════════
        #  /upload/* → Go server handles uploads
        # ═══════════════════════════════════════
        location /upload/ {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Content-Type $content_type;
            client_max_body_size 100m;
        }

        # ── Nginx status (for monitoring) ──
        location /nginx-status {
            stub_status on;
            allow 127.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
        }
    }
}
