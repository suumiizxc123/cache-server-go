# ═══════════════════════════════════════════════════════
#  Nginx — Binary Content Cache Layer
#
#  Architecture:
#    Client → Nginx (disk+RAM cache) → Go Server → MinIO/S3
#
#  Caches: images, SVG, video, fonts, CSS, JS
#  Bypasses: API calls (/cache/*, /stats, /health) → Go server
# ═══════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ── Buffers ──
    client_max_body_size 100m;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css text/xml application/json
               application/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 4;

    # ── Logging ──
    log_format cache '$remote_addr - $request_method $uri '
                     'status=$status bytes=$bytes_sent '
                     'cache=$upstream_cache_status '
                     'time=${request_time}s';
    access_log /var/log/nginx/access.log cache;

    # ═══════════════════════════════════════
    #  Cache Zone — Binary Content
    #  - 2GB disk cache
    #  - 256MB RAM for keys
    #  - Inactive items purged after 7 days
    # ═══════════════════════════════════════
    proxy_cache_path /var/cache/nginx/content
        levels=1:2
        keys_zone=content_cache:256m
        max_size=2g
        inactive=7d
        use_temp_path=off;

    # ── Upstream: Go Cache Server ──
    upstream cache_server {
        server cache-server:8080;
        keepalive 128;
    }

    # ── Upstream: MinIO (object storage) ──
    upstream minio {
        server minio:9000;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        # ═══════════════════════════════════════
        #  /api/* → Go Cache Server (no nginx cache)
        # ═══════════════════════════════════════
        location /cache/ {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        location /stats {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /meta/ {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /list-assets {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ═══════════════════════════════════════
        #  /assets/* → Nginx cached binary content
        #  Images, SVG, video, fonts from MinIO
        # ═══════════════════════════════════════
        location /assets/ {
            proxy_cache content_cache;
            proxy_cache_valid 200 301 302 24h;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating
                                  http_500 http_502 http_503 http_504;
            proxy_cache_lock on;             # prevent thundering herd
            proxy_cache_lock_timeout 5s;
            proxy_cache_revalidate on;
            proxy_cache_min_uses 1;

            # Cache key includes URI only (no query string abuse)
            proxy_cache_key "$uri";

            # Pass to MinIO — /assets/test.svg → minio:9000/assets/test.svg
            proxy_pass http://minio;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host minio:9000;

            # Cache headers for client
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=86400" always;

            # CORS for assets
            add_header Access-Control-Allow-Origin "*" always;
        }

        # ═══════════════════════════════════════
        #  /upload/* → Go server handles uploads
        # ═══════════════════════════════════════
        location /upload/ {
            proxy_pass http://cache_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header Content-Type $content_type;
            client_max_body_size 100m;
        }

        # ── Nginx status (for monitoring) ──
        location /nginx-status {
            stub_status on;
            allow 127.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
        }
    }
}
