version: "3.9"

# ═══════════════════════════════════════════════════════
#  Docker Compose — DEV (Minimal, Fast Startup)
#
#  Usage:
#    docker compose up -d --build
#
#  Services: nginx, cache-server, redis, minio
#  Flow:
#    Client → Nginx(:80) → disk cache → MinIO   [assets]
#    Client → Nginx(:80) → Go server(:8080)      [API]
# ═══════════════════════════════════════════════════════

services:
  # ── Nginx (Reverse Proxy + Disk Cache) ──
  nginx:
    image: nginx:alpine
    container_name: cache-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - cache-server

  # ── Cache Server (Go) ──
  cache-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cache-server
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - SERVER_PORT=8080
      - GRPC_PORT=9090
      - REDIS_ADDRS=redis:6379
      - REDIS_POOL_SIZE=500
      - L1_MAX_SIZE=100000
      - L1_TTL=30s
      - L2_TTL=10m
      - ORIGIN_LATENCY=10ms
      - ENABLE_SINGLEFLIGHT=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_BUCKET=assets
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      redis:
        condition: service_healthy

  # ── Redis (single node) ──
  redis:
    image: redis:7-alpine
    container_name: cache-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lfu
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (Object Storage) ──
  minio:
    image: minio/minio:latest
    container_name: cache-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Bucket Init (one-shot) ──
  minio-init:
    image: minio/mc:latest
    container_name: cache-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/assets
        mc anonymous set download local/assets
        echo "MinIO bucket 'assets' ready"

volumes:
  nginx-cache:
  minio-data:
