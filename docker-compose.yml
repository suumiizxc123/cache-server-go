version: "3.9"

# ═══════════════════════════════════════════════════════
#  Docker Compose — Full Cache Stack (Hybrid Nginx + Squid)
#
#  Services:
#    - nginx:        Reverse proxy (routing, gzip, SSL, CORS)
#    - squid:        Disk-based binary content cache
#    - cache-server: Go app (L1 in-process + L2 Redis + gRPC)
#    - redis:        Metadata + key-value cache
#    - minio:        S3-compatible object storage (images, video, SVG)
#    - prometheus:   Metrics (optional)
#    - grafana:      Dashboard (optional)
#
#  Flow:
#    Client → Nginx(:80) → Squid(:3128) → MinIO  [binary assets]
#    Client → Nginx(:80) → Go server(:8080)       [API/cache]
#    Go server → L1 → Redis → Origin/MinIO
# ═══════════════════════════════════════════════════════

services:
  # ── Nginx (Reverse Proxy + Routing) ──
  nginx:
    image: nginx:alpine
    container_name: cache-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cache-server
      - squid
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Squid (Disk-Based Binary Content Cache) ──
  squid:
    image: ubuntu/squid:latest
    container_name: cache-squid
    ports:
      - "3128:3128"
    volumes:
      - ./squid/squid.conf:/etc/squid/squid.conf:ro
      - squid-cache:/var/spool/squid
    depends_on:
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3128/ || true"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Redis (L2 Metadata + Key-Value Cache) ──
  redis:
    image: redis:7-alpine
    container_name: cache-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lfu
      --save ""
      --appendonly no
      --tcp-backlog 511
      --hz 100
      --tcp-keepalive 60
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ── MinIO (S3-Compatible Object Storage) ──
  minio:
    image: minio/minio:latest
    container_name: cache-minio
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Bucket Init (one-shot) ──
  minio-init:
    image: minio/mc:latest
    container_name: cache-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/assets
        mc anonymous set download local/assets
        echo "MinIO bucket 'assets' ready with public read access"

  # ── Cache Server (Go — gRPC + HTTP + Binary Handler) ──
  cache-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cache-server
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - SERVER_PORT=8080
      - GRPC_PORT=9090
      - REDIS_ADDRS=redis:6379
      - REDIS_POOL_SIZE=500
      - L1_MAX_SIZE=100000
      - L1_TTL=30s
      - L2_TTL=10m
      - ORIGIN_LATENCY=10ms
      - ENABLE_SINGLEFLIGHT=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_BUCKET=assets
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      redis:
        condition: service_healthy

  # ── Prometheus (Metrics) ──
  prometheus:
    image: prom/prometheus:latest
    container_name: cache-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles:
      - monitoring

  # ── Grafana (Dashboard) ──
  grafana:
    image: grafana/grafana:latest
    container_name: cache-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    profiles:
      - monitoring

volumes:
  redis-data:
  minio-data:
  squid-cache:
