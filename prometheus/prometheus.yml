global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Go cache server metrics
  - job_name: "cache-server"
    static_configs:
      - targets: ["cache-server:8080"]

  # HAProxy stats
  - job_name: "haproxy"
    static_configs:
      - targets: ["haproxy:8404"]

  # Nginx stub_status
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx:80"]
    metrics_path: /nginx-status

  # Redis
  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  # Node exporter (hardware)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Blackbox (external probes)
  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://nginx:80/health
          - http://cache-server:8080/health
          - http://minio:9000/minio/health/live
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
