version: "3.9"

# ═══════════════════════════════════════════════════════
#  Redis Cluster — 6 Nodes (3 Primary + 3 Replica)
#
#  This is the minimum viable Redis Cluster for testing.
#  Production: 20 primary + 20 replica (as designed).
#
#  Usage:
#    docker compose -f deploy/redis-cluster/docker-compose.redis-cluster.yml up -d
#    docker exec redis-node-1 redis-cli --cluster create \
#      redis-node-1:6379 redis-node-2:6379 redis-node-3:6379 \
#      redis-node-4:6379 redis-node-5:6379 redis-node-6:6379 \
#      --cluster-replicas 1 --cluster-yes
# ═══════════════════════════════════════════════════════

services:
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lfu
      --appendonly no
      --save ""
      --hz 100
      --tcp-backlog 511
    ports:
      - "6381:6379"
    volumes:
      - redis-data-1:/data
    networks:
      - redis-cluster

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lfu
      --appendonly no
      --save ""
    ports:
      - "6382:6379"
    volumes:
      - redis-data-2:/data
    networks:
      - redis-cluster

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lfu
      --appendonly no
      --save ""
    ports:
      - "6383:6379"
    volumes:
      - redis-data-3:/data
    networks:
      - redis-cluster

  redis-node-4:
    image: redis:7-alpine
    container_name: redis-node-4
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lfu
      --appendonly no
      --save ""
    ports:
      - "6384:6379"
    volumes:
      - redis-data-4:/data
    networks:
      - redis-cluster

  redis-node-5:
    image: redis:7-alpine
    container_name: redis-node-5
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lfu
      --appendonly no
      --save ""
    ports:
      - "6385:6379"
    volumes:
      - redis-data-5:/data
    networks:
      - redis-cluster

  redis-node-6:
    image: redis:7-alpine
    container_name: redis-node-6
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lfu
      --appendonly no
      --save ""
    ports:
      - "6386:6379"
    volumes:
      - redis-data-6:/data
    networks:
      - redis-cluster

  # ── Cluster Init (one-shot) ──
  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Redis nodes..."
        sleep 5
        echo "Creating Redis Cluster..."
        redis-cli --cluster create \
          redis-node-1:6379 redis-node-2:6379 redis-node-3:6379 \
          redis-node-4:6379 redis-node-5:6379 redis-node-6:6379 \
          --cluster-replicas 1 --cluster-yes
        echo "Redis Cluster created!"
        redis-cli -h redis-node-1 cluster info
    networks:
      - redis-cluster

networks:
  redis-cluster:
    driver: bridge

volumes:
  redis-data-1:
  redis-data-2:
  redis-data-3:
  redis-data-4:
  redis-data-5:
  redis-data-6:
