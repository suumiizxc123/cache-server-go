apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-cache-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: cache-server
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: cache-server
      release: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cache-server
        release: {{ .Release.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.server.httpPort }}"
        prometheus.io/path: "/stats"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - cache-server
                topologyKey: kubernetes.io/hostname
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: cache-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.httpPort }}
            - name: grpc
              containerPort: {{ .Values.server.grpcPort }}
          env:
            - name: SERVER_PORT
              value: "{{ .Values.server.httpPort }}"
            - name: GRPC_PORT
              value: "{{ .Values.server.grpcPort }}"
            - name: L1_MAX_SIZE
              value: "{{ .Values.l1.maxSize }}"
            - name: L1_TTL
              value: "{{ .Values.l1.ttl }}"
            - name: REDIS_ADDRS
              value: "{{ .Values.redis.addrs }}"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-redis-secret
                  key: password
                  optional: true
            - name: REDIS_POOL_SIZE
              value: "{{ .Values.redis.poolSize }}"
            - name: L2_TTL
              value: "{{ .Values.redis.ttl }}"
            - name: ORIGIN_LATENCY
              value: "{{ .Values.origin.latency }}"
            - name: ENABLE_SINGLEFLIGHT
              value: "{{ .Values.features.singleflight }}"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
