# ═══════════════════════════════════════════════════
#  Cache Server Helm Values
# ═══════════════════════════════════════════════════

replicaCount: 3

image:
  repository: cache-server
  tag: latest
  pullPolicy: IfNotPresent

# ── Server Config ──
server:
  httpPort: 8080
  grpcPort: 9090

# ── L1 Cache ──
l1:
  maxSize: 50000
  ttl: "10s"

# ── L2 Redis ──
redis:
  # For external Redis Cluster:
  addrs: "redis-cluster-0.redis-cluster-headless:6379,redis-cluster-1.redis-cluster-headless:6379,redis-cluster-2.redis-cluster-headless:6379"
  password: ""
  poolSize: 500
  ttl: "5m"

# ── Origin ──
origin:
  latency: "10ms"

# ── Features ──
features:
  singleflight: true

# ── Resources ──
resources:
  requests:
    cpu: "2"
    memory: "512Mi"
  limits:
    cpu: "4"
    memory: "1Gi"

# ── Autoscaling ──
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

# ── Pod Disruption Budget ──
pdb:
  enabled: true
  minAvailable: "80%"

# ── Service ──
service:
  type: ClusterIP

# ── Ingress ──
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: cache.example.com
      paths:
        - path: /
          pathType: Prefix

# ── Monitoring ──
monitoring:
  enabled: true
  serviceMonitor: true

# ── Node Selection ──
nodeSelector: {}
tolerations: []
affinity: {}
