apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-server
  namespace: cache-system
  labels:
    app: cache-server
    version: v1
spec:
  replicas: 3  # Start with 3, HPA scales to 50+
  selector:
    matchLabels:
      app: cache-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0  # zero-downtime deploys
  template:
    metadata:
      labels:
        app: cache-server
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/stats"
    spec:
      # ── Anti-Affinity: spread across nodes ──
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - cache-server
                topologyKey: kubernetes.io/hostname

      # ── Topology Spread: even distribution ──
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: cache-server

      terminationGracePeriodSeconds: 30

      containers:
        - name: cache-server
          image: cache-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9090
              protocol: TCP

          envFrom:
            - configMapRef:
                name: cache-server-config

          # ── Resource Requests/Limits ──
          resources:
            requests:
              cpu: "2"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "1Gi"

          # ── Health Checks ──
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5

          # ── Lifecycle Hooks ──
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]  # drain connections

      # ── Service Account ──
      serviceAccountName: cache-server
      automountServiceAccountToken: false
