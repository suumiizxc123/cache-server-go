apiVersion: v1
kind: ConfigMap
metadata:
  name: cache-server-config
  namespace: cache-system
  labels:
    app: cache-server
data:
  # ── Server ──
  SERVER_PORT: "8080"
  GRPC_PORT: "9090"

  # ── L1 Cache (In-Process) ──
  L1_MAX_SIZE: "50000"
  L1_TTL: "10s"

  # ── L2 Cache (Redis Cluster) ──
  # Points to Redis Cluster headless service
  REDIS_ADDRS: "redis-cluster-0.redis-cluster-headless.cache-system.svc.cluster.local:6379,redis-cluster-1.redis-cluster-headless.cache-system.svc.cluster.local:6379,redis-cluster-2.redis-cluster-headless.cache-system.svc.cluster.local:6379,redis-cluster-3.redis-cluster-headless.cache-system.svc.cluster.local:6379,redis-cluster-4.redis-cluster-headless.cache-system.svc.cluster.local:6379,redis-cluster-5.redis-cluster-headless.cache-system.svc.cluster.local:6379"
  REDIS_POOL_SIZE: "500"
  L2_TTL: "5m"

  # ── Origin ──
  ORIGIN_LATENCY: "10ms"

  # ── Features ──
  ENABLE_SINGLEFLIGHT: "true"
