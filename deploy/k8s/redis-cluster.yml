apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-cluster-config
  namespace: cache-system
data:
  redis.conf: |
    # ── Redis Cluster Node Configuration ──
    cluster-enabled yes
    cluster-config-file nodes.conf
    cluster-node-timeout 5000
    cluster-migration-barrier 1

    # ── Memory ──
    maxmemory 2gb
    maxmemory-policy allkeys-lfu

    # ── Performance ──
    hz 100
    tcp-backlog 511
    tcp-keepalive 60
    timeout 0

    # ── Persistence (disabled for cache) ──
    save ""
    appendonly no

    # ── Network ──
    bind 0.0.0.0
    protected-mode no

---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-headless
  namespace: cache-system
  labels:
    app: redis-cluster
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: redis-cluster
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    - name: gossip
      port: 16379
      targetPort: 16379

---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: cache-system
  labels:
    app: redis-cluster
spec:
  type: ClusterIP
  selector:
    app: redis-cluster
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: cache-system
  labels:
    app: redis-cluster
spec:
  serviceName: redis-cluster-headless
  replicas: 6  # 3 primary + 3 replica (minimum cluster)
  selector:
    matchLabels:
      app: redis-cluster
  template:
    metadata:
      labels:
        app: redis-cluster
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - redis-cluster
                topologyKey: kubernetes.io/hostname

      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - /etc/redis/redis.conf
            - --cluster-announce-hostname
            - "$(POD_NAME).redis-cluster-headless.cache-system.svc.cluster.local"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: redis
              containerPort: 6379
            - name: gossip
              containerPort: 16379
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
            - name: redis-data
              mountPath: /data

          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10

      volumes:
        - name: redis-config
          configMap:
            name: redis-cluster-config

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
# ── Job: Initialize Redis Cluster (run once after StatefulSet is ready) ──
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-cluster-init
  namespace: cache-system
  labels:
    app: redis-cluster
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: redis:7-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for all Redis nodes to be ready..."
              for i in 0 1 2 3 4 5; do
                HOST="redis-cluster-${i}.redis-cluster-headless.cache-system.svc.cluster.local"
                until redis-cli -h $HOST ping 2>/dev/null | grep -q PONG; do
                  echo "Waiting for $HOST..."
                  sleep 2
                done
                echo "$HOST is ready"
              done

              echo "Creating Redis Cluster..."
              redis-cli --cluster create \
                redis-cluster-0.redis-cluster-headless.cache-system.svc.cluster.local:6379 \
                redis-cluster-1.redis-cluster-headless.cache-system.svc.cluster.local:6379 \
                redis-cluster-2.redis-cluster-headless.cache-system.svc.cluster.local:6379 \
                redis-cluster-3.redis-cluster-headless.cache-system.svc.cluster.local:6379 \
                redis-cluster-4.redis-cluster-headless.cache-system.svc.cluster.local:6379 \
                redis-cluster-5.redis-cluster-headless.cache-system.svc.cluster.local:6379 \
                --cluster-replicas 1 --cluster-yes

              echo "Cluster info:"
              redis-cli -h redis-cluster-0.redis-cluster-headless.cache-system.svc.cluster.local cluster info
              echo "Done!"
