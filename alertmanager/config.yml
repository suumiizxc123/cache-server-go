global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'

  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 5m

receivers:
  - name: 'default'
    # Configure webhook/slack/email here
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#alerts'
    #     text: '{{ .CommonAnnotations.summary }}'

  - name: 'critical'
    # webhook_configs:
    #   - url: 'http://your-webhook-endpoint/alert'
