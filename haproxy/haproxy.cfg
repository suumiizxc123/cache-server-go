# ═══════════════════════════════════════════════════════
#  HAProxy — Load Balancer (10 Gbps tuned)
#
#  Client → HAProxy(:80) → Varnish(:6081) → Nginx → Go/MinIO
#  Stats UI: http://localhost:8404/stats
# ═══════════════════════════════════════════════════════

global
    maxconn 100000
    nbthread 4
    log stdout format raw local0
    tune.bufsize 32768
    tune.maxrewrite 8192
    tune.rcvbuf.client 256000
    tune.rcvbuf.server 256000
    tune.sndbuf.client 256000
    tune.sndbuf.server 256000

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    timeout connect 5s
    timeout client  120s
    timeout server  120s
    timeout http-request 60s
    maxconn 50000

# ── Stats Dashboard ──
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST

# ── HTTP Frontend ──
frontend http_front
    bind *:80
    default_backend varnish_back

    # Health check endpoint (bypass backend)
    acl is_health path /haproxy-health
    http-request return status 200 content-type text/plain string "OK" if is_health

# ── Varnish Backend (RAM cache) ──
backend varnish_back
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200

    server varnish1 varnish:6081 check inter 5s fall 3 rise 2 maxconn 50000
