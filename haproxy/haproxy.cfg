# ═══════════════════════════════════════════════════════
#  HAProxy — Load Balancer + Health Check
#
#  Client → HAProxy(:80) → Nginx backend(s)
#  Stats UI: http://localhost:8404/stats
# ═══════════════════════════════════════════════════════

global
    maxconn 4096
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    timeout http-request 10s

# ── Stats Dashboard ──
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST

# ── HTTP Frontend ──
frontend http_front
    bind *:80
    default_backend nginx_back

    # Health check endpoint (bypass backend)
    acl is_health path /haproxy-health
    http-request return status 200 content-type text/plain string "OK" if is_health

# ── Nginx Backend ──
backend nginx_back
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200

    server nginx1 nginx:80 check inter 5s fall 3 rise 2 maxconn 1000
    # Scale: add more nginx instances here
    # server nginx2 nginx2:80 check inter 5s fall 3 rise 2 maxconn 1000
