# ═══════════════════════════════════════════════════════
#  Squid — Disk-Based Binary Content Cache (Reverse Proxy)
#
#  Architecture:
#    Nginx → Squid(:3128) → MinIO(:9000)
#
#  Squid handles:
#    - Disk cache for large files (video, images)
#    - Memory cache for small files (icons, SVG, fonts)
#    - Efficient cache eviction (LRU)
#    - Low RAM usage compared to Nginx proxy_cache
# ═══════════════════════════════════════════════════════

# ── Reverse Proxy Mode ──
# Squid acts as a reverse proxy (accelerator) for MinIO
http_port 3128 accel defaultsite=minio vhost

# ── Origin: MinIO ──
cache_peer minio parent 9000 0 no-query originserver name=minio

# ── Access Control ──
acl assets urlpath_regex ^/assets/
http_access allow assets
http_access deny all

# ═══════════════════════════════════════
#  Cache Storage
#  - Disk: 2GB aufs cache, 16/256 directory levels
#  - Memory: 128MB for hot objects
#  - Max object: 50MB (covers large video files)
# ═══════════════════════════════════════
cache_dir aufs /var/spool/squid 2048 16 256
cache_mem 128 MB
maximum_object_size 50 MB
maximum_object_size_in_memory 1 MB
minimum_object_size 0 bytes

# ── Cache Policy ──
# Aggressively cache everything, ignore origin cache headers
refresh_pattern .  4320  100%  43200  override-expire override-lastmod reload-into-ims ignore-no-store ignore-private

# ── Performance ──
workers 2
dns_nameservers 127.0.0.11
connect_timeout 5 seconds
read_timeout 60 seconds
client_lifetime 1 day
pconn_timeout 30 seconds
pipeline_prefetch on
half_closed_clients off

# ── Memory tuning ──
memory_pools on
memory_pools_limit 64 MB

# ── Logging ──
logformat custom %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %mt
access_log stdio:/var/log/squid/access.log custom
cache_log stdio:/var/log/squid/cache.log
cache_store_log none

# ── Visible hostname ──
visible_hostname cache-squid
